set -gq extended-keys on
set -gq extended-keys-format csi-u

# theme
set -g @col_bg     "#1a1b26"
set -g @col_bg_hi  "#292e42"
set -g @col_blue   "#7aa2f7"
set -g @col_purple "#9d7cd8"
set -g @col_fg     "#c0caf5"
set -g @col_green  "#9ece6a"
set -g @col_cyan   "#7dcfff"
set -g status off
set -g status-position top
set -g status-style "fg=#{@col_fg},bg=#{@col_bg}"
set -g status-left " #[fg=#{@col_cyan},bold]  #S #[fg=#{@col_fg},nobold] "
set -g status-right ""
set -g status-left-length 30
set -g window-status-current-format "#[fg=#{@col_blue},bold,bg=#{@col_bg_hi}] #I:#W "
set -g window-status-format "#[fg=#{@col_fg},bg=#{@col_bg}] #I:#W "
set -g window-status-separator ""
set -g pane-border-style "fg=#{@col_bg_hi}"
set -g pane-active-border-style "fg=#{@col_blue}"
set -g pane-border-lines heavy

# prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# windows
bind -n C-- set-option -g status
bind -n C-0 if-shell 'tmux select-window -t 0' '' 'new-window -t 0'
bind -n C-1 if-shell 'tmux select-window -t 1' '' 'new-window -t 1'
bind -n C-2 if-shell 'tmux select-window -t 2' '' 'new-window -t 2'
bind -n C-3 if-shell 'tmux select-window -t 3' '' 'new-window -t 3'
bind -n C-4 if-shell 'tmux select-window -t 4' '' 'new-window -t 4'
bind -n C-5 if-shell 'tmux select-window -t 5' '' 'new-window -t 5'
bind -n C-6 if-shell 'tmux select-window -t 6' '' 'new-window -t 6'
bind -n C-7 if-shell 'tmux select-window -t 7' '' 'new-window -t 7'
bind -n C-8 if-shell 'tmux select-window -t 8' '' 'new-window -t 8'
bind -n C-9 if-shell 'tmux select-window -t 9' '' 'new-window -t 9'

# panes
unbind l
bind l send-keys C-l
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key s split-window -h
bind-key S split-window -v

# set vi-mode
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
